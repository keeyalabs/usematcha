[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "usematcha"
version = "0.1.0"
description = "Energy observability for AI workloads"
readme = "README.md"
requires-python = ">=3.9"
license = "Apache-2.0"
authors = [{name = "Keeya Labs", email = "jay@keeyalabs.com"}]
keywords = ["gpu", "energy", "power", "training", "nvml", "observability"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Topic :: System :: Monitoring",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = ["nvidia-ml-py"]

[project.urls]
Homepage = "https://usematcha.dev"

[project.scripts]
matcha = "matcha.cli:main"

[tool.setuptools]
packages = ["matcha"]
